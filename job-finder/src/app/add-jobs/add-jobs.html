<div class="min-h-screen bg-gradient-to-br from-purple-100 via-blue-50 to-white flex items-center justify-center p-6">
  <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-3xl">
    <h1 class="text-4xl font-extrabold text-purple-700 mb-8 text-center">Post a New Job</h1>

    <form [formGroup]="jobForm" (ngSubmit)="postJob()" class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Job Title -->
      <div class="flex flex-col">
        <label class="text-purple-700 font-semibold mb-2">Job Title</label>
        <input 
          type="text" 
          formControlName="title" 
          placeholder="Enter job title"
          class="border-2 border-purple-300 rounded-xl p-3 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition duration-300 shadow-sm">
      </div>

      <!-- Job Type -->
      <div class="flex flex-col">
        <label class="text-purple-700 font-semibold mb-2">Job Type</label>
        <select 
          formControlName="type" 
          class="border-2 border-purple-300 rounded-xl p-3 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition duration-300 shadow-sm">
          <option value="Full Time">Full Time</option>
          <option value="Part Time">Part Time</option>
          <option value="Remote">Remote</option>
          <option value="Internship">Internship</option>
        </select>
      </div>

      <!-- Job Description -->
      <div class="md:col-span-2 flex flex-col">
        <label class="text-purple-700 font-semibold mb-2">Description</label>
        <textarea 
          rows="4" 
          formControlName="description" 
          placeholder="Enter job description"
          class="border-2 border-purple-300 rounded-xl p-3 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition duration-300 shadow-sm"></textarea>
      </div>

      <!-- Submit Button -->
      <div class="md:col-span-2 flex justify-center">
        <button 
          type="submit" 
          class="bg-gradient-to-r from-purple-600 to-blue-500 text-white font-bold px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transform transition duration-300 hover:from-blue-500 hover:to-purple-600">
          Post Job
        </button>
      </div>

    </form>
  </div>
</div>
