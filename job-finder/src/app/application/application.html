<div class="bg-white rounded-2xl shadow-md border border-purple-100 overflow-x-auto">
  <table class="w-full text-left border-collapse">
    <thead class="bg-purple-100 text-purple-700">
      <tr>
        <th class="p-4">Job Title</th>
        <th class="p-4">Applicant Name</th>
        <th class="p-4">Email</th>
        <th class="p-4">CV</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let app of applications" class="border-t hover:bg-purple-50">
        <td class="p-4">{{ app.jobTitle }}</td>
        <td class="p-4">{{ app.applicantName }}</td>
        <td class="p-4">{{ app.email }}</td>
        <td class="p-4">
          <a
            *ngIf="app.cvUrl"
            [href]="app.cvUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700"
          >
            View CV
          </a>
          <span *ngIf="!app.cvUrl" class="text-gray-400 text-sm">No CV</span>
        </td>
      </tr>
      <tr *ngIf="applications.length === 0">
        <td colspan="4" class="text-center p-4 text-gray-500">No applications found</td>
      </tr>
    </tbody>
  </table>
</div>
