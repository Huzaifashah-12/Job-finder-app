<div class="flex flex-col md:flex-row min-h-screen">

  <!-- Sidebar -->
  <aside class="w-full md:w-64 bg-white shadow-lg border-b md:border-b-0 md:border-r border-purple-100">
    <div class="p-6">
      <h2 class="text-2xl font-bold text-purple-700">Employer Panel</h2>
    </div>

    <nav class="mt-6 space-y-2 px-4">
      <button (click)="showSection('dashboard')"
        class="w-full text-left py-2 px-4 rounded-lg hover:bg-purple-100"
        [ngClass]="currentSection === 'dashboard' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        Dashboard
      </button>

      <button (click)="showSection('register-company')"
        class="w-full text-left py-2 px-4 rounded-lg hover:bg-purple-100"
        [ngClass]="currentSection === 'register-company' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        Register Company
      </button>

      <button (click)="showSection('add-job')"
        class="w-full text-left py-2 px-4 rounded-lg hover:bg-purple-100"
        [ngClass]="currentSection === 'add-job' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        Add Job
      </button>

      <button (click)="showSection('my-jobs')"
        class="w-full text-left py-2 px-4 rounded-lg hover:bg-purple-100"
        [ngClass]="currentSection === 'my-jobs' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        My Jobs
      </button>

      <button (click)="showSection('applications')"
        class="w-full text-left py-2 px-4 rounded-lg hover:bg-purple-100"
        [ngClass]="currentSection === 'applications' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        Applications
      </button>

      <hr class="my-4 border-purple-100">

      <button (click)="logout()"
        class="w-full text-left py-2 px-4 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 font-medium">
        Logout
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 p-4 md:p-8">
    <!-- Dashboard -->
    <div *ngIf="currentSection === 'dashboard'">
      <h1 class="text-2xl sm:text-3xl md:text-3xl lg:text-4xl font-bold text-purple-700 mb-6">
        {{ companyName ? companyName + ' Dashboard' : 'Dashboard Overview' }}
      </h1>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-md border border-purple-100">
          <h3 class="text-lg font-semibold text-purple-700">Total Jobs</h3>
          <p class="text-3xl font-bold mt-3 text-gray-700">{{ totalJobs }}</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border border-purple-100">
          <h3 class="text-lg font-semibold text-purple-700">Applications</h3>
          <p class="text-3xl font-bold mt-3 text-gray-700">{{ totalApplications }}</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border border-purple-100">
          <h3 class="text-lg font-semibold text-purple-700">Active Jobs</h3>
          <p class="text-3xl font-bold mt-3 text-gray-700">{{ activeJobs }}</p>
        </div>
      </div>
    </div>

    <!-- Register Company -->
    <ng-container *ngIf="currentSection === 'register-company'">
      <app-register-company></app-register-company>
    </ng-container>

    <!-- Add Job -->
    <ng-container *ngIf="currentSection === 'add-job'">
      <app-add-jobs></app-add-jobs>
    </ng-container>

    <!-- My Jobs -->
    <ng-container *ngIf="currentSection === 'my-jobs'">
      <app-my-jobs></app-my-jobs>
    </ng-container>

    <!-- Applications -->
    <div *ngIf="currentSection === 'applications'">
      <h1 class="text-2xl sm:text-3xl md:text-3xl lg:text-4xl font-bold text-purple-700 mb-6">
        Job Applications
      </h1>
      <app-application></app-application>
    </div>
  </div>

</div>
