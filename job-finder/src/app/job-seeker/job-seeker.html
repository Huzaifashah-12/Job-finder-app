<!-- job-seeker.html -->
<div class="flex flex-col md:flex-row min-h-screen bg-purple-50">
  <!-- Sidebar -->
  <aside class="w-full md:w-64 bg-white shadow-lg border-b md:border-b-0 md:border-r border-purple-100">
    <div class="p-6">
      <h2 class="text-2xl font-bold text-purple-700">Job Seeker Panel</h2>
    </div>

    <nav class="mt-6 space-y-2 px-4 pb-6 md:pb-0">
      <button (click)="showSection('dashboard')" 
              class="w-full text-left block py-2 px-4 rounded-lg hover:bg-purple-100"
              [ngClass]="currentSection === 'dashboard' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        Dashboard
      </button>
      <button (click)="showSection('browse')" 
              class="w-full text-left block py-2 px-4 rounded-lg hover:bg-purple-100"
              [ngClass]="currentSection === 'browse' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        Browse Jobs
      </button>
      <button (click)="showSection('applications')" 
              class="w-full text-left block py-2 px-4 rounded-lg hover:bg-purple-100"
              [ngClass]="currentSection === 'applications' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        My Applications
      </button>
      <button (click)="showSection('profile')" 
              class="w-full text-left block py-2 px-4 rounded-lg hover:bg-purple-100"
              [ngClass]="currentSection === 'profile' ? 'bg-purple-100 text-purple-700 font-medium' : 'text-gray-600'">
        Profile
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 p-4 sm:p-6 md:p-8">
    <!-- Dashboard -->
    <div *ngIf="currentSection === 'dashboard'">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-purple-700">Dashboard Overview</h1>
        <button (click)="logout()" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">Logout</button>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-2xl shadow-md border border-purple-100 flex flex-col items-center">
          <h3 class="text-lg font-semibold text-purple-700 mb-2">Total Applications</h3>
          <p class="text-3xl font-bold text-purple-900">{{ appliedStats.totalApplications }}</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-md border border-purple-100 flex flex-col items-center">
          <h3 class="text-lg font-semibold text-purple-700 mb-2">Active Jobs</h3>
          <p class="text-3xl font-bold text-purple-900">{{ appliedStats.activeJobs }}</p>
        </div>
      </div>
      <!-- Applied Jobs -->
      <div class="bg-white p-6 rounded-2xl shadow-md border border-purple-100 mb-6">
        <h3 class="text-lg font-semibold text-purple-700 mb-3">Applied Jobs</h3>
        <ul>
          <li *ngFor="let job of appliedJobs" class="py-1 border-b border-gray-200">
            {{ job.title }} - {{ job.companyName }} <span class="text-sm text-gray-500">({{ job.status }})</span>
          </li>
        </ul>
      </div>
    </div>

    <!-- Browse Jobs -->
    <div *ngIf="currentSection === 'browse'">
      <h2 class="text-2xl font-bold text-purple-700 mb-4">Browse Jobs</h2>
      <app-browse-jobs></app-browse-jobs>
    </div>

    <!-- My Applications -->
    <div *ngIf="currentSection === 'applications'">
      <h2 class="text-2xl font-bold text-purple-700 mb-4">My Applications</h2>
      <app-my-applications></app-my-applications>
    </div>

    <!-- Profile -->
    <div *ngIf="currentSection === 'profile'">
      <h2 class="text-2xl font-bold text-purple-700 mb-4">Profile</h2>
      <app-my-profile></app-my-profile>
    </div>
  </div>
</div>
