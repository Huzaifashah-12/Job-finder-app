<div>
  <h1 class="text-3xl font-bold text-purple-700 mb-8">My Applications</h1>

  <div class="bg-white rounded-2xl shadow-md border border-purple-100 overflow-x-auto">
    <table class="w-full text-left">
      <thead class="bg-purple-100 text-purple-700">
        <tr>
          <th class="p-4">Job Title</th>
          <th class="p-4">Company</th>
          <th class="p-4">Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let app of applications" class="border-t">
          <td class="p-4">{{ app.jobTitle }}</td>
          <td class="p-4">{{ app.company }}</td>
          <td class="p-4 text-yellow-600 font-medium">{{ app.status }}</td>
        </tr>

        <tr *ngIf="applications.length === 0">
          <td colspan="3" class="p-4 text-center text-gray-500">No applications found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
