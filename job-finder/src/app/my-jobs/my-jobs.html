<div class="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-white p-6 flex justify-center">
  <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-4xl">
    <h1 class="text-4xl font-extrabold text-purple-700 mb-8 text-center">My Jobs</h1>

    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-purple-100 text-purple-700">
          <tr>
            <th class="p-4 font-medium uppercase tracking-wide">Title</th>
            <th class="p-4 font-medium uppercase tracking-wide">Type</th>
            <th class="p-4 font-medium uppercase tracking-wide">Status</th>
            <th class="p-4 font-medium uppercase tracking-wide">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let job of jobs" class="border-t hover:bg-purple-50 transition duration-200">
            <td class="p-4">{{ job.title }}</td>
            <td class="p-4">{{ job.type }}</td>
            <td class="p-4">
              <span 
                [ngClass]="{
                  'bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold': job.status === 'Active',
                  'bg-red-100 text-red-700 px-3 py-1 rounded-full font-semibold': job.status === 'Inactive'
                }">
                {{ job.status }}
              </span>
            </td>
            <td class="p-4 space-x-2">
              <button 
                (click)="deleteJob(job._id)" 
                class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-semibold transition duration-300">
                Delete
              </button>
             
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
