<div>
  <h1 class="text-3xl font-bold text-purple-700 mb-8">My Profile</h1>

  <div class="bg-white rounded-2xl shadow-md p-6 border border-purple-100 max-w-xl">

    <form [formGroup]="profileForm" (ngSubmit)="updateProfile()" class="space-y-4">

      <div>
        <label class="text-sm text-purple-700">Full Name</label>
        <input type="text" formControlName="fullName" [readonly]="!isEditing"
          class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
      </div>

      <div>
        <label class="text-sm text-purple-700">Email</label>
        <input type="email" formControlName="email" [readonly]="!isEditing"
          class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
      </div>

      <!-- Upload CV -->
      <div>
        <label class="text-sm text-red-700">Upload CV (PDF or Word only)</label>

        <!-- Show existing CV -->
        <div *ngIf="originalData?.cvUrl" class="mb-2">
          <a [href]="originalData.cvUrl" target="_blank" class="text-blue-600 underline">
            View Current CV
          </a>
        </div>

        <input type="file" accept=".pdf,.doc,.docx" (change)="onFileSelect($event)" class="w-full mt-1">

        <p *ngIf="fileError" class="text-red-600 text-sm mt-1">{{ fileError }}</p>
      </div>

      <div class="flex flex-wrap gap-4 mt-6">
        <button type="button" *ngIf="!isEditing" (click)="enableEdit()" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700">
          Edit
        </button>

        <button type="submit" *ngIf="isEditing" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
          Save
        </button>

        <button type="button" *ngIf="isEditing" (click)="cancelEdit()" class="bg-gray-400 text-white px-6 py-2 rounded-lg hover:bg-gray-500">
          Cancel
        </button>
      </div>

    </form>

  </div>
</div>
