<div class="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-white flex items-center justify-center p-6">
  <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-3xl">
    <h1 class="text-4xl font-extrabold text-purple-700 mb-8 text-center">Register Your Company</h1>

    <form [formGroup]="companyForm" (ngSubmit)="registerCompany()" class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Company Name -->
      <div class="flex flex-col">
        <label class="text-purple-700 font-semibold mb-2">Company Name</label>
        <input 
          type="text" 
          formControlName="name" 
          class="border-2 border-purple-300 rounded-xl p-3 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition duration-300 shadow-sm"
          placeholder="Enter company name">
      </div>

      <!-- Industry -->
      <div class="flex flex-col">
        <label class="text-purple-700 font-semibold mb-2">Industry</label>
        <input 
          type="text" 
          formControlName="industry" 
          class="border-2 border-purple-300 rounded-xl p-3 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition duration-300 shadow-sm"
          placeholder="Enter industry">
      </div>

      <!-- Description -->
      <div class="md:col-span-2 flex flex-col">
        <label class="text-purple-700 font-semibold mb-2">Description</label>
        <textarea 
          rows="4" 
          formControlName="description" 
          class="border-2 border-purple-300 rounded-xl p-3 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition duration-300 shadow-sm"
          placeholder="Briefly describe your company"></textarea>
      </div>

      <!-- Submit Button -->
      <div class="md:col-span-2 flex justify-center">
        <button 
          type="submit" 
          class="bg-gradient-to-r from-purple-600 to-pink-500 text-white font-bold px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transform transition duration-300 hover:from-pink-500 hover:to-purple-600">
          Register Company
        </button>
      </div>

    </form>
  </div>
</div>
