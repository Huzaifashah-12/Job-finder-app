<div class="min-h-screen flex items-center justify-center bg-purple-50 px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 border border-purple-100">

    <!-- Title -->
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-purple-700">Welcome Back</h2>
      <p class="text-gray-500 mt-2">Sign in to your account</p>
    </div>

    <!-- ERROR -->
    <div *ngIf="errorMessage"
         class="mb-4 bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm">
      {{ errorMessage }}
    </div>

    <!-- FORM -->
    <form [formGroup]="signInForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-purple-700">Email</label>

        <input type="email"
               formControlName="email"
               placeholder="Enter your email"
               class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg">

        <p *ngIf="signInForm.get('email')?.touched && signInForm.get('email')?.errors?.['required']"
           class="text-red-500 text-sm">Email is required</p>

        <p *ngIf="signInForm.get('email')?.touched && signInForm.get('email')?.errors?.['email']"
           class="text-red-500 text-sm">Enter a valid email</p>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-purple-700">Password</label>

        <input type="password"
               formControlName="password"
               placeholder="Enter your password"
               class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg">

        <p *ngIf="signInForm.get('password')?.touched && signInForm.get('password')?.errors?.['required']"
           class="text-red-500 text-sm">Password is required</p>

        <p *ngIf="signInForm.get('password')?.touched && signInForm.get('password')?.errors?.['minlength']"
           class="text-red-500 text-sm">Password must be at least 6 characters</p>
      </div>

      <!-- Remember -->
      <div class="flex items-center">
        <input type="checkbox"
               formControlName="rememberMe"
               class="accent-purple-600">
        <span class="ml-2 text-gray-600 text-sm">Remember me</span>
      </div>

      <!-- BUTTON -->
      <button type="submit"
              [disabled]="signInForm.invalid"
              class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 disabled:opacity-50">
        Sign In
      </button>

    </form>

    <!-- SIGNUP LINK -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Don’t have an account?
      <a routerLink="/sign-up"
         class="text-purple-600 hover:underline font-medium">
        Sign Up
      </a>
    </p>

  </div>
</div>
