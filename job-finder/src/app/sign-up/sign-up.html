<div class="min-h-screen flex items-center justify-center bg-purple-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 border border-purple-100">

    <!-- Title -->
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-purple-700">JobFinder</h2>
      <p class="text-gray-500 mt-2">Create your account</p>
    </div>

    <!-- Form -->
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-4">

      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium text-purple-700">Full Name</label>
        <input type="text" formControlName="fullName" placeholder="Enter your full name"
          class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none">
        <p *ngIf="signupForm.get('fullName')?.touched && signupForm.get('fullName')?.invalid"
           class="text-red-500 text-sm mt-1">Full Name is required</p>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-purple-700">Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email"
          class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none">
        <p *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.errors?.['required']"
           class="text-red-500 text-sm mt-1">Email is required</p>
        <p *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.errors?.['email']"
           class="text-red-500 text-sm mt-1">Enter a valid email</p>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-purple-700">Password</label>
        <input type="password" formControlName="password" placeholder="Create a password"
          class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none">
        <p *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.errors?.['required']"
           class="text-red-500 text-sm mt-1">Password is required</p>
        <p *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.errors?.['minlength']"
           class="text-red-500 text-sm mt-1">Password must be at least 6 characters</p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-purple-700">Confirm Password</label>
        <input type="password" formControlName="confirmPassword" placeholder="Confirm your password"
          class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none">
        <p *ngIf="signupForm.errors?.['mismatch'] && signupForm.get('confirmPassword')?.touched"
           class="text-red-500 text-sm mt-1">Passwords do not match</p>
      </div>

      <!-- Role -->
      <div>
        <label class="block text-sm font-medium text-purple-700">Register As</label>
        <select formControlName="role"
          class="w-full mt-1 px-4 py-2 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none">
          <option value="seeker">Job Seeker</option>
      <option value="recruiter">Employer</option>
        </select>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="signupForm.invalid"
        class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition duration-300 shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
        Sign Up
      </button>

    </form>

    <!-- Login Link -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a routerLink="/sign-in" class="text-purple-600 hover:underline font-medium">Login</a>
    </p>

  </div>
</div>
